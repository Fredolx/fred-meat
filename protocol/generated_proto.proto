syntax = "proto3";
package generated_proto;

message InitMessage {
  string db_path = 1;
  string temp_path = 2;
}

message StrMessage {
  string value = 1;
}

message OptStrMessage {
  optional string value = 1;
}

message BoolMessage {
  bool value = 1;
}

message Settings {
  optional bool test = 1;
}

message FFIResult {
  bool success = 1;
  optional string error_message = 2;
  oneof data {
    BoolMessage bool_message = 3;
    Settings settings = 4;
  }
}


